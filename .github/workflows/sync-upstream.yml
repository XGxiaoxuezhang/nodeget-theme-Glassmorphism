name: Sync upstream changes

on:
  workflow_dispatch:
  schedule:
    - cron: '17 3 * * 1'

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: sync-upstream
  cancel-in-progress: true

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout main
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: main

      - name: Fetch upstream
        run: |
          git remote add upstream https://github.com/sanrokamlan-prog/komari-theme-Glassmorphism.git
          git fetch upstream main --tags

      - name: Merge upstream main
        run: |
          branch="sync/upstream-main-${GITHUB_RUN_ID}"
          git switch -c "$branch"
          if ! git merge --no-ff --no-edit upstream/main; then
            git merge --abort
            echo "Upstream changes conflict with the NodeGet adapter. Resolve the merge manually instead of guessing." >&2
            exit 1
          fi
          git push --set-upstream origin "$branch"

      - name: Open sync pull request
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          branch: sync/upstream-main-${{ github.run_id }}
          delete-branch: true
          title: 'chore: sync upstream Glassmorphism changes'
          commit-message: 'chore: sync upstream Glassmorphism changes'
          body: |
            This PR contains upstream changes from:
            https://github.com/sanrokamlan-prog/komari-theme-Glassmorphism

            Review carefully. NodeGet adapter files and public-probe security boundaries must remain intact.
          labels: |
            upstream-sync
